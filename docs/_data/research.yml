# Research pillars (AI, Security, System).
#   summary -> short text on the homepage cards
#   detail + topics + image -> the /research/ page (alternating big figures)
# To swap a figure: drop a file in assets/img/research/ and update `image`.
- title: AI
  image: ai.svg
  summary: >-
    Securing modern AI and using AI for security — from jailbreaking and safely
    fine-tuning large language models to ML/NLP methods that detect threats at scale.
  detail: >-
    AI is now both a target and a tool. We study how large language and multimodal
    models fail under adversarial pressure and how to make them dependable: jailbreaking
    GPT-based text-to-image models (PC²), exposing and repairing the safety of
    Mixture-of-Experts LLMs (MoEvil, SafeMoE), unlearning unsafe alignment, and
    neutralizing backdoors planted during parameter-efficient fine-tuning (Obliviate,
    Claim-Guided). In parallel we turn modern ML and NLP back on security itself —
    pretrained dark-web language models (DarkBERT) and graph- and federated-learning
    systems that predict credential reuse and surface illicit activity at scale.
  topics:
    - "LLM safety & jailbreaking — PC², SafeMoE, MoEvil"
    - "Unlearning & backdoor defense — Obliviate, Claim-Guided"
    - "ML / NLP for security — DarkBERT, federated & graph-based detection"
- title: Security
  image: security.svg
  summary: >-
    Revealing and defending against threats across networks, the web, and
    blockchains — through deep system analysis, side-channel research, and
    large-scale measurement.
  detail: >-
    Our founding mission is to reveal threats and defend networked systems. We pair
    deep system understanding with large-scale measurement: tracing intrusions to
    their root cause via security provenance (SECTRACER), fuzzing and fingerprinting
    SDN/SD-WAN control planes (Ambusher, Heimdallr), uncovering micro-architectural
    and timing side channels (AVXProbe, AVX-TSCHA), hardening anonymity networks and
    topology against deanonymization (MUFLLER, EqualNet), and measuring permissionless
    blockchains and their abuse (Partitioning Ethereum, illicit-Bitcoin detection).
  topics:
    - "Network, web & SDN security — SECTRACER, Ambusher"
    - "Side-channel & micro-architectural attacks — AVXProbe, AVX-TSCHA"
    - "Blockchain & threat intelligence — Partitioning Ethereum, Vulcan"
- title: System
  image: system.svg
  summary: >-
    High-performance systems that are secure by construction — SmartNIC acceleration,
    confidential serverless, and secure container and in-network systems.
  detail: >-
    We build systems that deliver security and performance together, often pushing
    enforcement into hardware and the network data path. Recent work accelerates
    service-mesh ingress with SmartNICs (HybridMesh, HardMesh), runs serverless
    functions inside trusted execution with fast snapshots (AccelFaaS, TDSnap,
    Cryonics), gives containers RDMA-aware and hardware-isolated networking (RDNet,
    Hyperion, HardWhale), and embeds security into SDN/NFV with reconfigurable
    hardware for line-rate inspection (Reinhardt).
  topics:
    - "SmartNIC & service-mesh acceleration — HybridMesh, HardMesh"
    - "Confidential serverless / FaaS — AccelFaaS, TDSnap, Cryonics"
    - "Secure container & in-network systems — RDNet, Hyperion, Reinhardt"
