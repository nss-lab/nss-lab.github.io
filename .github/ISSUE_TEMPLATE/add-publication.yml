name: Add / update a publication
description: Add, update, or remove a paper on the Publications page.
title: "[publication] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Manage one paper on the Publications page. Empty optional fields are fine.
        A lab maintainer then applies a label:
        - **`publication-check`** — safe dry run: validates everything and replies
          with a preview, but commits nothing.
        - **`publication`** — applies it for real and rebuilds the site.
  - type: dropdown
    id: operation
    attributes:
      label: Operation
      description: >
        Add a new paper, update an existing one (attach a PDF/link or fix details),
        or delete one. Update and Delete find the paper by its exact **Title** below.
      options:
        - Add a new publication
        - Update an existing publication
        - Delete a publication
      default: 0
    validations:
      required: true
  - type: textarea
    id: title
    attributes:
      label: Title
      description: >
        The paper title. For **Add** this is the new title; for **Update**/**Delete**
        paste the existing paper's title exactly so it can be found.
    validations:
      required: true
  - type: input
    id: year
    attributes:
      label: Year
      description: Four digits. Required to **Add**; a new year section is created if needed.
      placeholder: "2026"
  - type: input
    id: venue
    attributes:
      label: Venue tag
      description: Short tag shown in parentheses — e.g. NDSS, CCS, Usenix Security. Required to **Add**.
      placeholder: "NDSS"
  - type: input
    id: authors
    attributes:
      label: Authors
      description: Full author line. Mark co-first authors with * and add "(* Co-first author)" if you use it.
      placeholder: "Myoungsung You, Jaehyun Nam, Minjae Seo, Taejune Park, Seungwon Shin"
  - type: input
    id: info
    attributes:
      label: Info line
      description: The grey line under the title — full venue name, year, and any status such as "(to appear)".
      placeholder: "USENIX Networked Systems Design and Implementation (NSDI), 2026 (to appear)"
  - type: textarea
    id: pdf
    attributes:
      label: Paper PDF
      description: >
        Drag-and-drop the PDF here (or click to attach). Leave empty for an
        announce-only "to appear" paper, or when using the external link below.
      placeholder: "Drop the PDF here…"
  - type: input
    id: ext
    attributes:
      label: External link
      description: Use instead of a PDF for a paywalled paper — the "Paper" button points here.
      placeholder: "https://openreview.net/forum?id=…"
  - type: input
    id: filename
    attributes:
      label: Filename override
      description: Optional. Leave blank to auto-name as venuetag+year-firstauthor.pdf.
